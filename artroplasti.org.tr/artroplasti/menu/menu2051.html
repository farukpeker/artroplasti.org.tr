<!-- KART STİLİ --><style>
  :root{
    --border:#e6e8f0; --muted:#687086; --text:#1f2430;
    --red1:#e11d48; --red2:#fb7185;
  }
  .events{ width:min(1100px,94%); margin: 0 auto; }
  .event-card{
    max-width: 1000px;
    margin: 40px auto;              /* ORTALAMA */
    display: grid;
    grid-template-columns: 1.1fr 1.4fr; /* görsel | içerik */
    border-radius: 16px;
    border: 1px solid var(--border);
    background: linear-gradient(180deg,#ffffff,#fcfcff);
    box-shadow: 0 12px 30px rgba(0,0,0,.08);
    overflow: hidden;
  }
  .event-media{ background: #fff;
    min-height: 220px;
    display: flex
;
    justify-content: center;
    align-items: center;
    height: 100%;
    padding: 10px; }
  .event-media img{ width:100%; object-fit:cover; display:block;margin: 10px; }
  .event-body{ padding:22px 24px; display:flex; flex-direction:column; gap:12px; }
  .event-title{ margin:0; font:800 24px/1.2 system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; letter-spacing:.2px; }
  .event-meta{
    display:grid; grid-template-columns: 90px 1fr;
    align-items:center; gap:6px 14px; padding:6px 0;
    border-bottom:1px dashed #e9ebf3;
  }
  .event-meta:last-of-type{ border-bottom:0; }
  .event-meta p{ margin:0; }
  .event-meta p:first-child{ color:var(--muted); font-weight:600; }
  .event-meta p:last-child{ color:var(--text); }
  .actions{ display:flex; flex-wrap:wrap; gap:10px; margin-top:6px; }
  .btn{
    display:inline-flex; align-items:center; justify-content:center;
    padding:10px 14px; border-radius:12px; text-decoration:none;
    font-weight:700; letter-spacing:.2px; border:1px solid var(--border);
    color:#111827; background:#fff; transition: transform .15s, box-shadow .15s, border-color .15s;
  }
  .btn:hover{ transform:translateY(-2px); box-shadow:0 8px 18px rgba(0,0,0,.08); border-color:#d7dae6; }
  .btn.primary{ color:#fff; border:none; background:linear-gradient(180deg,var(--red1),var(--red2)); }
  .btn.primary:hover{ box-shadow:0 10px 22px rgba(235,73,113,.35); }
  @media (max-width: 860px){
    .event-card{ grid-template-columns:1fr; }
    .event-media{ height:220px; }
    .event-title{ font-size:22px; }
  }
</style><section class="events"><article class="event-card" itemscope="" itemtype="https://schema.org/Event" data-start="2022-03-24" data-end="2022-03-27" data-location="Antalya, Türkiye"><div class="event-media"><img src="https://web.citius.technology/images/kadad-test/haber/kadad-bolgesel-toplantilar--konya.png" alt="12. Ulusal Kalça Diz Artroplasti Kongresi afişi" loading="lazy"></div><div class="event-body"><h2 class="event-title display-6 mb-4 pb-3 pt-3 text-center" style="background-color:#e1f0ff;" itemprop="name">KADAD Konya Toplantısı</h2><div class="event-meta"><p><span aria-hidden="true">📅</span> Konu</p><p>Primerden Revizyona Kalça Artroplastisi</p></div><div class="event-meta"><p><span aria-hidden="true">📅</span> Tarih</p><p>14 Eylül 2025</p></div><div class="event-meta"><p><span aria-hidden="true">📍</span> Yer</p><p><span class="loc-text" itemprop="location">Konya</span></p></div><div class="actions"><a class="btn" href="#" target="_blank" rel="noopener noreferrer">Program</a></div></div></article></section>
